<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Mejores Scores 2026</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      max-width: 800px;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }

    th {
      background-color: #f4f4f4;
    }

    tr:hover {
      background-color: #f9f9f9;
    }
  </style>
</head>

<body>
  <h2>Mejores vueltas - Año 2026</h2>

  <table id="tablaResultados">
    <thead>
      <tr>
        <th>Jugador</th>
        <th>Mejor Ida</th>
        <th>Fecha Ida</th>
        <th>Mejor Vuelta</th>
        <th>Fecha Vuelta</th>
        <th>Tarj Ideal</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <!-- <script src="app.js"></script> -->

  <script>
    async function cargarDatos() {
      try {
        const response = await fetch("/api/tarjetas");
        const data = await response.json();

        const resultados = procesarDatos(data);
        renderTabla(resultados);
      } catch (error) {
        console.error("Error cargando datos:", error);
      }
    }

    function procesarDatos(data) {
      // 1. Agrupar por jugador + fecha + tramo
      const rondas = {};

      data.forEach((item) => {
        const { jugador, fecha, hoyo, golpes } = item;

        const año = new Date(fecha).getFullYear();
        if (año !== 2026) return;

        const tramo = hoyo >= 1 && hoyo <= 9 ? "ida" : "vuelta";

        const key = `${jugador}_${fecha}_${tramo}`;

        if (!rondas[key]) {
          rondas[key] = {
            jugador,
            fecha,
            tramo,
            total: 0,
          };
        }

        rondas[key].total += golpes;
      });

      // 2. Buscar mínimos por jugador
      const mejores = {};

      Object.values(rondas).forEach((r) => {
        const { jugador, tramo, total, fecha } = r;

        if (!mejores[jugador]) {
          mejores[jugador] = {
            ida: { score: Infinity, fecha: null },
            vuelta: { score: Infinity, fecha: null },
          };
        }

        if (total < mejores[jugador][tramo].score) {
          mejores[jugador][tramo] = {
            score: total,
            fecha: fecha,
          };
        }
      });

      return mejores;
    }

    function formatearFecha(fecha) {
      const d = new Date(fecha);
      return d.toLocaleDateString("es-AR");
    }

    //   tbody.innerHTML = "";

    //   Object.entries(resultados).forEach(([jugador, datos]) => {
    //     const tr = document.createElement("tr");
    //     const tarjIdeal = (datos.ida.score + datos.vuelta.score);

    //     tr.innerHTML = `
    //       <td>${jugador}</td>
    //       <td>${datos.ida.score}</td>
    //       <td>${datos.ida.fecha ? formatearFecha(datos.ida.fecha) : ""}</td>

    //       <td>${datos.vuelta.fecha ? formatearFecha(datos.vuelta.fecha) : ""}</td>
    //       <td>${tarjIdeal}</td>

    //   `;

    //     tbody.appendChild(tr);
    //   });
    // }

    function renderTabla(resultados) {
      const tbody = document.querySelector("#tablaResultados tbody");
      tbody.innerHTML = "";

      // Convertir a array y ordenar
      const ordenados = Object.entries(resultados).sort((a, b) => {
        const datosA = a[1];
        const datosB = b[1];

        const tarjA = datosA.ida.score + datosA.vuelta.score;
        const tarjB = datosB.ida.score + datosB.vuelta.score;

        // 1. Orden por Tarjeta Ideal
        if (tarjA !== tarjB) return tarjA - tarjB;

        // 2. Orden por Mejor Vuelta
        if (datosA.vuelta.score !== datosB.vuelta.score) {
          return datosA.vuelta.score - datosB.vuelta.score;
        }

        // 3. Orden por Mejor Ida
        return datosA.ida.score - datosB.ida.score;
      });

      // Render
      ordenados.forEach(([jugador, datos]) => {
        const tr = document.createElement("tr");
        const tarjIdeal = datos.ida.score + datos.vuelta.score;

        tr.innerHTML = `
      <td>${jugador}</td>
      <td>${datos.ida.score}</td>
      <td>${datos.ida.fecha ? formatearFecha(datos.ida.fecha) : ""}</td>
      <td>${datos.vuelta.score}</td>
      <td>${datos.vuelta.fecha ? formatearFecha(datos.vuelta.fecha) : ""}</td>
      <td>${tarjIdeal}</td>
    `;

        tbody.appendChild(tr);
      });
    }

    cargarDatos();
  </script>
</body>
